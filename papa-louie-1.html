<!DOCTYPE html>
<html lang=en>
<head>
    <meta content=noindex,nofollow name=robots>
    <title>Papa Louie When Pizzas Attack</title>
    <meta content="Here's your chance to play Papa Louie When Pizzas Attack! Have fun with this one!" name=description>
    <style>
        html,
        body {
            margin: 0;
            text-align: center;
            background: linear-gradient(navy, teal);
            height: 100%;
            overflow: hidden;       
        }
    </style>
</head>
<body>
<div id="container"></div>
<script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        autoplay: "on",
        contextMenu: false,
        unmuteOverlay: "hidden",
    };
    document.addEventListener("DOMContentLoaded", function() {
        let swf = '.swf';
        if (swf) {
            let ruffle = window.RufflePlayer.newest();
            let player = Object.assign(document.getElementById("container").appendChild(ruffle.createPlayer()), {
                style: 'width: 100%; height: 100%',
            });
            player.load({
                url: 'https://freeonlinegames.github.io/flash/swf/papa-louie-when-pizzas-attack.swf'
            });

        }
    });
</script>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</body>
</html>
